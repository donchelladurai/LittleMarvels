<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" fill="none" aria-hidden="true">
  <!-- Soft halo -->
  <circle cx="300" cy="320" r="240" fill="url(#halo)" opacity="0.5"/>

  <defs>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FCE6CD" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#FCE6CD" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="trunk" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3A3A3A"/>
      <stop offset="100%" stop-color="#1F1F1F"/>
    </linearGradient>
  </defs>

  <!-- Ground line / hill -->
  <path d="M40 480 Q 300 440 560 480 L 560 560 L 40 560 Z" fill="#FBF7F0" stroke="#EAE3D6" stroke-width="1.5"/>
  <path d="M40 480 Q 300 440 560 480" stroke="#EAE3D6" stroke-width="2" fill="none"/>

  <!-- Roots -->
  <path d="M280 480 Q 240 510 200 525" stroke="url(#trunk)" stroke-width="3" stroke-linecap="round" fill="none"/>
  <path d="M320 480 Q 360 510 400 525" stroke="url(#trunk)" stroke-width="3" stroke-linecap="round" fill="none"/>
  <path d="M300 480 L 300 530" stroke="url(#trunk)" stroke-width="3" stroke-linecap="round" fill="none"/>

  <!-- Trunk -->
  <path d="M285 480 Q 290 380 280 280 Q 270 200 295 140" stroke="url(#trunk)" stroke-width="14" stroke-linecap="round" fill="none"/>

  <!-- Major branches -->
  <!-- Upper left branch -->
  <path d="M285 240 Q 240 220 195 195 Q 175 184 160 165" stroke="url(#trunk)" stroke-width="8" stroke-linecap="round" fill="none"/>
  <!-- Upper right branch -->
  <path d="M290 200 Q 350 180 400 155 Q 430 140 450 120" stroke="url(#trunk)" stroke-width="8" stroke-linecap="round" fill="none"/>
  <!-- Mid left branch -->
  <path d="M280 320 Q 230 305 185 295 Q 160 290 140 280" stroke="url(#trunk)" stroke-width="6" stroke-linecap="round" fill="none"/>
  <!-- Mid right branch -->
  <path d="M285 360 Q 340 350 390 340 Q 420 333 445 320" stroke="url(#trunk)" stroke-width="6" stroke-linecap="round" fill="none"/>
  <!-- Top center branch -->
  <path d="M295 140 Q 300 100 320 80" stroke="url(#trunk)" stroke-width="6" stroke-linecap="round" fill="none"/>

  <!-- Twigs (smaller branches off the major ones) -->
  <path d="M195 195 Q 175 200 160 215" stroke="url(#trunk)" stroke-width="3" stroke-linecap="round" fill="none"/>
  <path d="M400 155 Q 395 130 410 115" stroke="url(#trunk)" stroke-width="3" stroke-linecap="round" fill="none"/>
  <path d="M185 295 Q 170 305 165 320" stroke="url(#trunk)" stroke-width="3" stroke-linecap="round" fill="none"/>
  <path d="M390 340 Q 405 350 405 365" stroke="url(#trunk)" stroke-width="3" stroke-linecap="round" fill="none"/>

  <!-- Leaves: organic teardrop shapes, alternating purple and orange -->
  <!-- Each leaf has a slight stem and two-tone fill via the leaf-shape path -->

  <g class="leaf-drift-1">
    <path d="M155 155 q -12 -18 -28 -18 q -4 14 6 26 q 8 10 22 -8 z" fill="#6722BC"/>
    <path d="M155 155 q -12 -18 -28 -18 q 0 12 28 18 z" fill="#7E3AC8" opacity="0.85"/>
  </g>
  <g class="leaf-drift-2">
    <path d="M170 175 q 14 -16 30 -10 q 0 14 -10 22 q -10 8 -20 -12 z" fill="#F2891C"/>
    <path d="M170 175 q 14 -16 30 -10 q -2 10 -30 10 z" fill="#F59E3F" opacity="0.85"/>
  </g>
  <g class="leaf-drift-3">
    <path d="M455 110 q -14 -16 -30 -10 q 0 14 10 22 q 10 8 20 -12 z" fill="#F2891C"/>
    <path d="M455 110 q -14 -16 -30 -10 q 2 10 30 10 z" fill="#F59E3F" opacity="0.85"/>
  </g>
  <g class="leaf-drift-1">
    <path d="M460 140 q 14 -10 24 4 q -4 12 -14 14 q -10 2 -10 -18 z" fill="#6722BC"/>
  </g>
  <g class="leaf-drift-2">
    <path d="M425 95 q 12 -14 26 -4 q -2 12 -10 18 q -10 4 -16 -14 z" fill="#6722BC"/>
  </g>
  <g class="leaf-drift-3">
    <path d="M325 70 q -12 -14 -28 -8 q 0 12 8 20 q 10 6 20 -12 z" fill="#F2891C"/>
  </g>
  <g class="leaf-drift-1">
    <path d="M310 60 q 12 -10 24 0 q -2 12 -10 16 q -10 2 -14 -16 z" fill="#6722BC"/>
  </g>

  <!-- Mid-height leaves -->
  <g class="leaf-drift-2">
    <path d="M135 270 q -12 -16 -28 -12 q -2 12 6 22 q 10 8 22 -10 z" fill="#F2891C"/>
  </g>
  <g class="leaf-drift-3">
    <path d="M120 290 q 14 -10 28 0 q -2 14 -12 18 q -12 2 -16 -18 z" fill="#6722BC"/>
  </g>
  <g class="leaf-drift-1">
    <path d="M455 320 q 14 -14 30 -6 q -2 14 -12 20 q -10 4 -18 -14 z" fill="#F2891C"/>
  </g>
  <g class="leaf-drift-2">
    <path d="M455 350 q -14 -14 -30 -8 q 2 14 12 20 q 12 4 18 -12 z" fill="#6722BC"/>
  </g>

  <!-- Cluster of leaves around main canopy -->
  <g class="leaf-drift-3">
    <ellipse cx="220" cy="170" rx="14" ry="10" fill="#6722BC" transform="rotate(-25 220 170)"/>
  </g>
  <g class="leaf-drift-1">
    <ellipse cx="245" cy="195" rx="12" ry="9" fill="#F2891C" transform="rotate(15 245 195)"/>
  </g>
  <g class="leaf-drift-2">
    <ellipse cx="370" cy="170" rx="14" ry="10" fill="#F2891C" transform="rotate(20 370 170)"/>
  </g>
  <g class="leaf-drift-3">
    <ellipse cx="345" cy="195" rx="12" ry="9" fill="#6722BC" transform="rotate(-10 345 195)"/>
  </g>
  <g class="leaf-drift-1">
    <ellipse cx="225" cy="305" rx="12" ry="9" fill="#F2891C" transform="rotate(-15 225 305)"/>
  </g>
  <g class="leaf-drift-2">
    <ellipse cx="355" cy="345" rx="14" ry="10" fill="#6722BC" transform="rotate(15 355 345)"/>
  </g>
  <g class="leaf-drift-3">
    <ellipse cx="190" cy="220" rx="11" ry="8" fill="#6722BC" transform="rotate(-30 190 220)"/>
  </g>
  <g class="leaf-drift-1">
    <ellipse cx="395" cy="220" rx="11" ry="8" fill="#F2891C" transform="rotate(30 395 220)"/>
  </g>

  <!-- A few falling leaves -->
  <g class="leaf-drift-2" opacity="0.9">
    <ellipse cx="510" cy="280" rx="9" ry="6" fill="#F2891C" transform="rotate(45 510 280)"/>
  </g>
  <g class="leaf-drift-3" opacity="0.9">
    <ellipse cx="90" cy="380" rx="8" ry="5" fill="#6722BC" transform="rotate(-30 90 380)"/>
  </g>
  <g class="leaf-drift-1" opacity="0.9">
    <ellipse cx="540" cy="420" rx="9" ry="6" fill="#6722BC" transform="rotate(30 540 420)"/>
  </g>
</svg>
